name: Sync Fork

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push to the fork

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true   # default, keeps token for push

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync fork
        run: |
          git remote add upstream https://github.com/openfootball/worldcup.json.git
          git fetch upstream
          git checkout main
          git merge upstream/main
          git push origin main
