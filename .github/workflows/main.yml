name: Sync Fork

on:
  schedule:
    - cron: '0 */3 * * *' 
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync fork
        run: |
          git remote add https://github.com/openfootball/worldcup.json.git
          git fetch upstream
          git checkout main
          git merge upstream/main
          git push origin main
